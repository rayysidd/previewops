apiVersion: apps/v1
kind: Deployment
metadata:
  name: bridge-api
  labels:
    app: bridge-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bridge-api
  template:
    metadata:
      labels:
        app: bridge-api
    spec:
      containers:
      - name: bridge-api
        image: 885232248552.dkr.ecr.eu-north-1.amazonaws.com/previewops-bridge:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: bridge-api-service
spec:
  selector:
    app: bridge-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080